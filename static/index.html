<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>歌词搜索</title>
<style>
/* 歌词插件样式 — CSS 变量、reset、body 和字体由主程序 common.css 提供 */
.wrap{max-width:520px;margin:0 auto;padding:24px 20px}
h1{font-size:18px;font-weight:600;margin-bottom:4px}
.sub{font-size:12px;color:var(--md-on-surface-variant);margin-bottom:24px}
.card h2{font-size:13px;font-weight:600;margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--md-on-surface-variant)}

.switch-row{display:flex;align-items:center;justify-content:space-between;padding:4px 0}
.switch-row-label{display:flex;flex-direction:column;gap:2px}
.switch-row-title{font-size:14px;font-weight:500;color:var(--md-on-surface)}
.switch-row-subtitle{font-size:12px;color:var(--md-on-surface-variant)}

.row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.row:last-child{margin-bottom:0}
.row label{font-size:13px;flex:1}
select,input[type=text]{padding:7px 10px;border:1px solid var(--md-outline-variant);border-radius:6px;background:transparent;color:var(--md-on-surface);font-size:13px;outline:none;width:100%}
select:focus,input[type=text]:focus{border-color:var(--md-primary)}
select{width:auto;min-width:120px;cursor:pointer}
.url-row{margin-top:8px}
.btn:disabled{opacity:.4;cursor:default;pointer-events:none}
.status{margin-top:12px;font-size:12px;padding:8px 12px;border-radius:6px;display:none}
.status.ok{display:block;background:rgba(76,175,80,.1);color:var(--md-success)}
.status.err{display:block;background:rgba(229,115,115,.1);color:var(--md-error)}
.status.info{display:block;background:rgba(124,154,224,.1);color:var(--md-primary)}
.test-row{display:flex;gap:8px;margin-bottom:8px}
.test-row input{flex:1}
.preview{margin-top:8px;font-size:11px;color:var(--md-on-surface-variant);white-space:pre-wrap;max-height:120px;overflow-y:auto;font-family:'Fira Code','JetBrains Mono',monospace;background:var(--md-surface-2);padding:8px;border-radius:4px;display:none}
</style>
</head>
<body>
<div class="wrap">
  <h1>歌词搜索</h1>
  <p class="sub">当歌曲没有歌词时，自动从外部 API 搜索并缓存</p>

  <div class="card">
    <h2>基本设置</h2>
    <div class="switch-row" style="margin-bottom:12px">
      <div class="switch-row-label">
        <span class="switch-row-title">启用歌词搜索</span>
        <span class="switch-row-subtitle">开启后自动为无歌词的歌曲搜索歌词</span>
      </div>
      <label class="switch">
        <input type="checkbox" id="enabled" aria-label="启用歌词搜索">
        <span class="switch-track"></span>
        <span class="switch-thumb"></span>
      </label>
    </div>
    <div class="row">
      <label for="provider">提供商</label>
      <select id="provider" aria-label="歌词提供商">
        <option value="lrclib">lrclib.net</option>
        <option value="custom">自定义 API</option>
      </select>
    </div>
    <div class="url-row" id="urlRow" style="display:none">
      <input type="text" id="customUrl" placeholder="https://your-lrcapi.example.com" aria-label="自定义 API 地址">
    </div>
  </div>

  <div style="display:flex;gap:8px">
    <button class="btn btn-filled" id="saveBtn" onclick="save()">保存</button>
  </div>
  <div class="status" id="saveStatus" aria-live="polite"></div>

  <div class="card" style="margin-top:16px">
    <h2>测试搜索</h2>
    <div class="test-row">
      <input type="text" id="testTitle" placeholder="歌曲名" value="Bohemian Rhapsody" aria-label="测试歌曲名">
      <input type="text" id="testArtist" placeholder="艺术家" value="Queen" aria-label="测试艺术家">
      <button class="btn btn-outlined" id="testBtn" onclick="testSearch()">测试</button>
    </div>
    <div class="status" id="testStatus" aria-live="polite"></div>
    <div class="preview" id="preview"></div>
  </div>
</div>

<script>
const $ = s => document.getElementById(s);
const { apiGet, apiPost, apiPut } = window.SongloftPlugin || {};

async function api(method, path, body) {
  if (method === 'GET') return await apiGet(path);
  if (method === 'PUT') return await apiPut(path, body);
  return await apiPost(path, body);
}

async function load() {
  try {
    const cfg = await api('GET', '/config');
    $('enabled').checked = cfg.enabled || false;
    $('provider').value = cfg.provider || 'lrclib';
    $('customUrl').value = cfg.customUrl || '';
    toggleUrl();
  } catch (e) {
    console.error('load config failed:', e);
  }
}

function toggleUrl() {
  $('urlRow').style.display = $('provider').value === 'custom' ? 'block' : 'none';
}

$('provider').addEventListener('change', toggleUrl);

async function save() {
  const btn = $('saveBtn');
  btn.disabled = true;
  const st = $('saveStatus');
  try {
    const cfg = {
      enabled: $('enabled').checked,
      provider: $('provider').value,
      customUrl: $('provider').value === 'custom' ? $('customUrl').value : '',
    };
    const res = await api('PUT', '/config', cfg);
    if (res.error) {
      st.className = 'status err'; st.textContent = res.error;
    } else {
      st.className = 'status ok'; st.textContent = '保存成功';
    }
  } catch (e) {
    st.className = 'status err'; st.textContent = '保存失败: ' + e.message;
  }
  btn.disabled = false;
  setTimeout(() => st.className = 'status', 3000);
}

async function testSearch() {
  const btn = $('testBtn');
  btn.disabled = true;
  const st = $('testStatus');
  const pv = $('preview');
  st.className = 'status info'; st.textContent = '搜索中...';
  pv.style.display = 'none';
  try {
    const t = encodeURIComponent($('testTitle').value);
    const a = encodeURIComponent($('testArtist').value);
    const res = await api('GET', `/test-search?title=${t}&artist=${a}`);
    if (res.success) {
      st.className = 'status ok'; st.textContent = '搜索成功';
      pv.textContent = res.preview || '(无预览)';
      pv.style.display = 'block';
    } else {
      st.className = 'status err'; st.textContent = '未找到歌词';
    }
  } catch (e) {
    st.className = 'status err'; st.textContent = '搜索失败: ' + e.message;
  }
  btn.disabled = false;
}

load();
</script>
</body>
</html>
